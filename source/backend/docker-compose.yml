version: '3.8'

services:
  app:
    build: .
    container_name: learning_analytics_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      - db
      - redis
      - jaeger
    restart: always

  db:
    image: postgres:16
    container_name: learning_analytics_db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7
    container_name: learning_analytics_redis
    ports:
      - "6379:6379"
    restart: always

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: learning_analytics_jaeger
    ports:
      - "16686:16686" # Web UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    restart: always

  prometheus:
    image: prom/prometheus:latest
    container_name: learning_analytics_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - app
    restart: always

volumes:
  postgres_data:
